# .github/workflows/api-tests.yml
name: API Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "api/**"
      - ".github/workflows/api-tests.yml"

jobs:
  test:
    name: Laravel Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: laravel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mongodb:
        image: mongo:8.2
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8.6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3" # match your Dockerfile
          extensions: pdo, pdo_pgsql, pgsql, mongodb, redis, bcmath, mbstring, xml, curl
          coverage: xdebug # remove if you don't need code coverage

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        working-directory: api
        run: cp .env.example .env.testing

      - name: Override env values for CI
        working-directory: api
        run: |
          php artisan key:generate --env=testing

          # Postgres
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env.testing
          sed -i 's|^DB_PORT=.*|DB_PORT=5432|' .env.testing
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=laravel_test|' .env.testing
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=postgres|' .env.testing
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=postgres|' .env.testing

          # MongoDB
          sed -i 's|^MONGO_HOST=.*|MONGO_HOST=127.0.0.1|' .env.testing
          sed -i 's|^MONGO_PORT=.*|MONGO_PORT=27017|' .env.testing

          # Redis
          sed -i 's|^REDIS_HOST=.*|REDIS_HOST=127.0.0.1|' .env.testing
          sed -i 's|^REDIS_PORT=.*|REDIS_PORT=6379|' .env.testing
          sed -i 's|^REDIS_PASSWORD=.*|REDIS_PASSWORD=null|' .env.testing

      - name: Run database migrations
        working-directory: api
        run: php artisan migrate --env=testing --force

      - name: Run tests
        working-directory: api
        run: php artisan test --env=testing --parallel
