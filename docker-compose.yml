services:
  keycloak:
    build: ./keycloak
    container_name: keycloak
    entrypoint: /bin/bash
    command: /opt/keycloak/init-keycloak.sh
    env_file:
      - ./keycloak/.env
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/data:/opt/keycloak/data
      - ./keycloak/init-keycloak.sh:/opt/keycloak/init-keycloak.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      interval: 30s
      retries: 10
      start_period: 60s
      test: ["CMD-SHELL", 'exec 3<>/dev/tcp/localhost/8080; echo -e "GET / HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; cat <&3; exec 3>&-;']
      timeout: 10s
    networks:
      - app-network

  postgres:
    image: postgres:18.2
    container_name: postgres
    env_file:
      - ./postgres/.env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  mongodb:
    image: mongo:8.2
    container_name: mongodb
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "./docker-entrypoint.sh"]
    container_name: api
    working_dir: /var/www/html
    env_file:
      - ./api/.env
    environment:
      # Override API URLs to point to the correct services within the Docker network by using service names.
      # These names resolve to the respective containers, allowing the API to communicate with PostgreSQL and MongoDB seamlessly.
      DB_HOST: postgres
      MONGO_HOST: mongodb
    ports:
      - "8000:8000"
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    extra_hosts:
    - 'keycloak.localhost:host-gateway'

  spa:
    build:
      context: ./spa
      dockerfile: Dockerfile
    container_name: spa
    env_file:
      - ./spa/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api.localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./spa:/app
      - /app/node_modules
      - /app/.next
    networks:
      - app-network
    depends_on:
      - api
    extra_hosts:
      - "keycloak.localhost:host-gateway"
    command: npm run dev

  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      keycloak:
        condition: service_healthy
      spa:
        condition: service_started
      api:
        condition: service_started

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
