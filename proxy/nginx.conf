events {
    worker_connections 1024;
}

http {
    # Increase proxy buffer sizes to handle large authentication headers
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    # Set appropriate timeouts for authentication flows
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    upstream keycloak {
        server keycloak:8080;
    }

    upstream spa {
        server spa:3000;
    }

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name keycloak.localhost;

        location / {
            proxy_pass http://keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Handle large headers from Keycloak authentication responses
            proxy_buffering on;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 80;
        server_name spa.localhost;

        location / {
            proxy_pass http://spa;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }
    }

    server {
        listen 80;
        server_name api.localhost;

        location / {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
